version: "3.9"

services:
  auth-service:
    build: .
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: dev
      AUTH_HASH_SECRET: change-me
      DATABASE_URL: ${DATABASE_URL}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      MIGRATION_MAX_RETRIES: ${MIGRATION_MAX_RETRIES:-20}
      MIGRATION_RETRY_DELAY: ${MIGRATION_RETRY_DELAY:-2}
      JWT_ISSUER: auth-service
      JWT_AUDIENCE: user-children-service
      JWT_ALGORITHMS: ${JWT_ALGORITHMS}
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 604800
      PROBLEM_TYPE_BASE_URL: https://example.com/problems
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
